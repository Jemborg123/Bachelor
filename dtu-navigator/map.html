<!DOCTYPE html>
<html>
<head>
    <title>DTU Campus Navigator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="map"></div>

    <!-- Floating search button -->
    <div id="searchFab" class="search-fab">
        <svg viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
    </div>

    <!-- Expandable search panel -->
    <div id="searchPanel" class="search-panel">
        <div class="search-panel-content">
            <input type="text" id="searchInput" class="search-panel-input" placeholder="Search building..." autocomplete="off">
            <button id="searchBtn" class="search-panel-btn">Go</button>
            <button id="closeSearchBtn" class="search-panel-close">×</button>
        </div>
        <div id="suggestions" class="search-panel-suggestions"></div>
    </div>
    <!-- Search bar
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search building (e.g., 'Building 101', 'Library')" autocomplete="off">
        <button id="searchBtn" class="search-btn">Search</button>
        <button id="clearBtn" class="search-btn clear-btn">Clear</button>
    </div>
    <div id="suggestions" class="suggestions"></div> -->
    
    <!-- Info panel -->
    <div id="info" class="info-panel">
        🔍 Search for a building or tap on map
    </div>

    <!-- Scripts -->
    <script src="map.js"></script>
    <script src="search.js"></script>
</body>
</html>
